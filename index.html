<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Speed Test</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #16162a;
            --text: #e0e0e0;
            --text-secondary: #a0a0b8;
            --accent: #6c5ce7;
            --accent-hover: #7f6ff0;
            --red: #e74c3c;
            --red-glow: #ff6b5b;
            --green: #00e676;
            --green-glow: #69f0ae;
            --gold: #ffd740;
            --orange: #ff9100;
            --blue: #40c4ff;
            --circle-size: min(280px, 60vw);
            --border-subtle: 1px solid rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(108, 92, 231, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 70%, rgba(0, 230, 118, 0.04) 0%, transparent 70%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            padding: 16px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        /* Title */
        .title {
            font-size: clamp(1.5rem, 3.5vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
            color: #fff;
            background: linear-gradient(135deg, #c4b5fd, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: -12px;
            letter-spacing: 0.02em;
        }

        /* Reaction Circle */
        .circle-wrapper {
            position: relative;
            width: var(--circle-size);
            height: var(--circle-size);
        }

        .circle-outer-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid transparent;
            transition: all 0.15s ease;
            pointer-events: none;
            z-index: 0;
        }

        .circle-outer-ring.waiting {
            border-color: rgba(231, 76, 60, 0.5);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.25), 0 0 60px rgba(231, 76, 60, 0.1);
            animation: pulse-ring-red 2s ease-in-out infinite;
        }

        .circle-outer-ring.ready {
            border-color: rgba(0, 230, 118, 0.7);
            box-shadow: 0 0 40px rgba(0, 230, 118, 0.4), 0 0 80px rgba(0, 230, 118, 0.2), 0 0 120px rgba(0, 230, 118, 0.1);
            animation: pulse-ring-green 0.6s ease-in-out infinite;
        }

        .circle-outer-ring.too-early {
            border-color: rgba(255, 145, 0, 0.7);
            box-shadow: 0 0 35px rgba(255, 145, 0, 0.4), 0 0 70px rgba(255, 145, 0, 0.15);
        }

        @keyframes pulse-ring-red {
            0%,
            100% {
                box-shadow: 0 0 25px rgba(231, 76, 60, 0.2), 0 0 50px rgba(231, 76, 60, 0.08);
            }
            50% {
                box-shadow: 0 0 35px rgba(231, 76, 60, 0.35), 0 0 70px rgba(231, 76, 60, 0.15);
            }
        }

        @keyframes pulse-ring-green {
            0%,
            100% {
                box-shadow: 0 0 35px rgba(0, 230, 118, 0.35), 0 0 75px rgba(0, 230, 118, 0.15);
            }
            50% {
                box-shadow: 0 0 55px rgba(0, 230, 118, 0.55), 0 0 100px rgba(0, 230, 118, 0.3);
            }
        }

        .reaction-circle {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.08s ease, box-shadow 0.08s ease, transform 0.1s ease;
            z-index: 1;
            background: var(--surface);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .reaction-circle:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .reaction-circle:active {
            transform: scale(0.97);
            transition: transform 0.06s ease;
        }

        .reaction-circle.idle {
            background: var(--surface);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .reaction-circle.waiting {
            background: #2a1515;
            border-color: rgba(231, 76, 60, 0.5);
            box-shadow: 0 8px 32px rgba(231, 76, 60, 0.2), inset 0 0 60px rgba(231, 76, 60, 0.05);
            cursor: pointer;
        }

        .reaction-circle.ready {
            background: #0a2a1a;
            border-color: rgba(0, 230, 118, 0.6);
            box-shadow: 0 8px 40px rgba(0, 230, 118, 0.35), 0 0 80px rgba(0, 230, 118, 0.15), inset 0 0 80px rgba(0, 230, 118, 0.08);
            cursor: pointer;
            animation: circle-ready-pop 0.25s ease-out;
        }

        .reaction-circle.too-early {
            background: #2a1a0a;
            border-color: rgba(255, 145, 0, 0.6);
            box-shadow: 0 8px 32px rgba(255, 145, 0, 0.3), inset 0 0 60px rgba(255, 145, 0, 0.05);
        }

        .reaction-circle.result-good {
            background: #0a1a2a;
            border-color: rgba(64, 196, 255, 0.5);
            box-shadow: 0 8px 32px rgba(64, 196, 255, 0.2);
        }

        .reaction-circle.result-ok {
            background: #1a1a0a;
            border-color: rgba(255, 215, 64, 0.5);
            box-shadow: 0 8px 32px rgba(255, 215, 64, 0.2);
        }

        .reaction-circle.result-slow {
            background: #1a0a0a;
            border-color: rgba(255, 107, 91, 0.4);
            box-shadow: 0 8px 32px rgba(255, 107, 91, 0.15);
        }

        @keyframes circle-ready-pop {
            0% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.03);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Circle inner content */
        .circle-content {
            text-align: center;
            pointer-events: none;
            z-index: 2;
            transition: all 0.1s ease;
        }

        .circle-icon {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            line-height: 1;
            transition: all 0.1s ease;
        }

        .circle-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .idle .circle-icon {
            opacity: 0.4;
            font-size: clamp(2rem, 7vw, 3.5rem);
        }
        .idle .circle-text {
            opacity: 0.5;
        }

        .waiting .circle-icon {
            opacity: 0.5;
            color: #ff6b5b;
            font-size: clamp(2.5rem, 8vw, 4rem);
        }
        .waiting .circle-text {
            color: #ff6b5b;
            opacity: 0.7;
        }

        .ready .circle-icon {
            color: #fff;
            font-size: clamp(5rem, 14vw, 8rem);
            text-shadow: 0 0 60px rgba(0, 230, 118, 0.8), 0 0 120px rgba(0, 230, 118, 0.5), 0 4px 8px rgba(0, 0, 0, 0.5);
            animation: exclamation-bounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ready .circle-text {
            color: #69f0ae;
            opacity: 1;
            font-weight: 700;
        }

        @keyframes exclamation-bounce {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            60% {
                transform: scale(1.08);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .too-early .circle-icon {
            color: #ff9100;
            font-size: clamp(2.5rem, 8vw, 4rem);
        }
        .too-early .circle-text {
            color: #ff9100;
            opacity: 1;
            font-weight: 600;
        }

        /* Result display inside circle */
        .result-time {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
        }
        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.7;
            margin-top: 2px;
        }
        .result-sub {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 2px;
        }

        .color-excellent {
            color: var(--gold);
        }
        .color-great {
            color: var(--green);
        }
        .color-good {
            color: var(--blue);
        }
        .color-ok {
            color: var(--orange);
        }
        .color-slow {
            color: var(--red-glow);
        }

        /* Status text below circle */
        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            min-height: 24px;
            letter-spacing: 0.02em;
            transition: color 0.2s;
        }
        .status-text.waiting-status {
            color: #ff6b5b;
        }
        .status-text.ready-status {
            color: #69f0ae;
            font-weight: 700;
            animation: status-flash 0.5s ease-in-out;
        }
        .status-text.too-early-status {
            color: #ff9100;
            font-weight: 600;
        }
        .status-text.result-status {
            color: var(--text-secondary);
        }

        @keyframes status-flash {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Options */
        .options-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .option-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.04);
        }
        .option-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.35);
        }
        .option-btn:active {
            transform: scale(0.96);
        }

        /* Start button */
        .start-btn {
            padding: 14px 40px;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            transition: all 0.2s ease;
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.4);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .start-btn:hover {
            background: var(--accent-hover);
            box-shadow: 0 8px 32px rgba(108, 92, 231, 0.55);
            transform: translateY(-2px);
        }
        .start-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.3);
        }
        .start-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .start-btn.secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: none;
        }
        .start-btn.secondary:hover {
            border-color: rgba(255, 255, 255, 0.55);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.08);
        }

        /* Stats section */
        .stats-panel {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
            background: var(--surface);
            border-radius: 16px;
            border: var(--border-subtle);
            min-height: 50px;
        }
        .stat-item {
            text-align: center;
            min-width: 50px;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
        }
        .attempt-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            animation: badge-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes badge-in {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .attempt-badge.excellent {
            border-color: #ffd740;
            background: rgba(255, 215, 64, 0.1);
            color: #ffd740;
            box-shadow: 0 0 12px rgba(255, 215, 64, 0.25);
        }
        .attempt-badge.great {
            border-color: #00e676;
            background: rgba(0, 230, 118, 0.08);
            color: #00e676;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
        }
        .attempt-badge.good {
            border-color: #40c4ff;
            background: rgba(64, 196, 255, 0.08);
            color: #40c4ff;
        }
        .attempt-badge.ok {
            border-color: #ff9100;
            background: rgba(255, 145, 0, 0.08);
            color: #ff9100;
        }
        .attempt-badge.slow {
            border-color: #ff6b5b;
            background: rgba(255, 107, 91, 0.08);
            color: #ff6b5b;
        }

        .no-attempts {
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
            font-style: italic;
        }

        /* Keyboard hint */
        .keyboard-hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.5;
            text-align: center;
            letter-spacing: 0.03em;
        }
        .key-icon {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin: 0 2px;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .container {
                gap: 14px;
            }
            .circle-wrapper {
                --circle-size: min(220px, 70vw);
            }
            .start-btn {
                padding: 12px 30px;
                font-size: 0.95rem;
            }
            .option-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
            .stats-panel {
                padding: 10px 14px;
                gap: 8px;
            }
            .attempt-badge {
                width: 32px;
                height: 32px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Title -->
        <h1 class="title">⚡ Reaction Speed Test</h1>
        <p class="subtitle">Click or press <span class="key-icon">Space</span> when you see the <strong>!</strong></p>

        <!-- Reaction Circle -->
        <div class="circle-wrapper" id="circleWrapper">
            <div class="circle-outer-ring" id="outerRing"></div>
            <div class="reaction-circle idle" id="reactionCircle" tabindex="0" role="button" aria-label="Reaction test area">
                <div class="circle-content" id="circleContent">
                    <div class="circle-icon" id="circleIcon">🎯</div>
                    <div class="circle-text" id="circleLabel">Ready?</div>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-text" id="statusText">Select a time option and press <strong>Start</strong></div>

        <!-- Options -->
        <div class="options-row">
            <button class="option-btn active" data-time="5000" id="opt5">⏱️ Max 5 seconds</button>
            <button class="option-btn" data-time="10000" id="opt10">⏱️ Max 10 seconds</button>
        </div>

        <!-- Start / Action Button -->
        <button class="start-btn" id="startBtn">▶ Start Test</button>

        <!-- Stats -->
        <div class="stats-panel" id="statsPanel">
            <span class="no-attempts" id="noAttemptsMsg">No attempts yet — give it a try!</span>
            <span id="attemptsContainer" style="display: none; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center;"></span>
        </div>

        <!-- Average display -->
        <div id="avgDisplay" style="font-size: 0.8rem; color: var(--text-secondary); min-height: 20px; text-align: center;"></div>

        <!-- Keyboard hint -->
        <p class="keyboard-hint">💡 Tip: Keep your finger on the <span class="key-icon">Space</span> bar for fastest results</p>
    </div>

    <script>
        (function() {
            // --- DOM Elements ---
            const reactionCircle = document.getElementById('reactionCircle');
            const circleWrapper = document.getElementById('circleWrapper');
            const outerRing = document.getElementById('outerRing');
            const circleIcon = document.getElementById('circleIcon');
            const circleLabel = document.getElementById('circleLabel');
            const circleContent = document.getElementById('circleContent');
            const statusText = document.getElementById('statusText');
            const startBtn = document.getElementById('startBtn');
            const opt5 = document.getElementById('opt5');
            const opt10 = document.getElementById('opt10');
            const statsPanel = document.getElementById('statsPanel');
            const noAttemptsMsg = document.getElementById('noAttemptsMsg');
            const attemptsContainer = document.getElementById('attemptsContainer');
            const avgDisplay = document.getElementById('avgDisplay');

            // --- State ---
            const STATE = { IDLE: 'idle', WAITING: 'waiting', READY: 'ready', TOO_EARLY: 'too_early', RESULT: 'result' };
            let currentState = STATE.IDLE;
            let maxWaitTime = 5000; // default 5 seconds
            const minWaitTime = 1500; // minimum 1.5 seconds before signal
            let signalTimestamp = null;
            let waitTimeoutId = null;
            let attempts = []; // array of reaction times in ms
            const maxAttemptsDisplay = 10;

            // --- Helper: classify reaction time ---
            function getReactionClass(ms) {
                if (ms < 180) return 'excellent';
                if (ms < 280) return 'great';
                if (ms < 380) return 'good';
                if (ms < 500) return 'ok';
                return 'slow';
            }

            function getReactionColorClass(ms) {
                if (ms < 180) return 'color-excellent';
                if (ms < 280) return 'color-great';
                if (ms < 380) return 'color-good';
                if (ms < 500) return 'color-ok';
                return 'color-slow';
            }

            function getResultCircleClass(ms) {
                if (ms < 380) return 'result-good';
                if (ms < 500) return 'result-ok';
                return 'result-slow';
            }

            // --- Update UI based on state ---
            function setCircleState(stateClass) {
                // Remove all state classes
                reactionCircle.classList.remove('idle', 'waiting', 'ready', 'too-early', 'result-good', 'result-ok',
                    'result-slow');
                outerRing.classList.remove('waiting', 'ready', 'too-early');
                // Add the new one
                if (stateClass === 'waiting') {
                    reactionCircle.classList.add('waiting');
                    outerRing.classList.add('waiting');
                } else if (stateClass === 'ready') {
                    reactionCircle.classList.add('ready');
                    outerRing.classList.add('ready');
                } else if (stateClass === 'too-early') {
                    reactionCircle.classList.add('too-early');
                    outerRing.classList.add('too-early');
                } else if (stateClass === 'result-good' || stateClass === 'result-ok' || stateClass === 'result-slow') {
                    reactionCircle.classList.add(stateClass);
                } else {
                    reactionCircle.classList.add('idle');
                }
            }

            function resetToIdle() {
                currentState = STATE.IDLE;
                if (waitTimeoutId) {
                    clearTimeout(waitTimeoutId);
                    waitTimeoutId = null;
                }
                signalTimestamp = null;
                setCircleState('idle');
                circleIcon.textContent = '🎯';
                circleLabel.textContent = 'Ready?';
                circleIcon.style.color = '';
                circleLabel.style.color = '';
                circleContent.style.display = '';
                statusText.textContent = 'Select a time option and press Start';
                statusText.className = 'status-text';
                startBtn.textContent = '▶ Start Test';
                startBtn.className = 'start-btn';
                startBtn.disabled = false;
                reactionCircle.style.cursor = 'pointer';
                updateStatsDisplay();
            }

            function showTooEarly() {
                currentState = STATE.TOO_EARLY;
                if (waitTimeoutId) {
                    clearTimeout(waitTimeoutId);
                    waitTimeoutId = null;
                }
                signalTimestamp = null;
                setCircleState('too-early');
                circleIcon.textContent = '⚠️';
                circleLabel.textContent = 'Too Early!';
                circleIcon.style.color = '';
                circleLabel.style.color = '';
                circleContent.style.display = '';
                statusText.textContent = 'You clicked too early! Wait for the "!" signal. Try again.';
                statusText.className = 'status-text too-early-status';
                startBtn.textContent = '🔄 Try Again';
                startBtn.className = 'start-btn';
                startBtn.disabled = false;
                reactionCircle.style.cursor = 'pointer';

                // Auto-reset after 1.8 seconds
                setTimeout(() => {
                    if (currentState === STATE.TOO_EARLY) {
                        resetToIdle();
                    }
                }, 1800);
            }

            function showResult(reactionMs) {
                currentState = STATE.RESULT;
                signalTimestamp = null;
                const rc = getReactionClass(reactionMs);
                const colorClass = getReactionColorClass(reactionMs);
                const resultCircleClass = getResultCircleClass(reactionMs);

                setCircleState(resultCircleClass);

                // Display reaction time inside circle
                circleIcon.style.display = 'none';
                circleLabel.style.display = 'none';
                circleContent.innerHTML = `
                    <div class="result-time ${colorClass}">${reactionMs}<span style="font-size:0.5em;opacity:0.7;">ms</span></div>
                    <div class="result-label ${colorClass}">${rc.toUpperCase()}</div>
                    <div class="result-sub">Reaction Time</div>
                `;

                const emojiMap = { excellent: '🏆', great: '🔥', good: '👍', ok: '👌', slow: '🐢' };
                statusText.textContent = `${emojiMap[rc]} ${rc.charAt(0).toUpperCase() + rc.slice(1)}! Your reaction: ${reactionMs}ms`;
                statusText.className = 'status-text result-status';

                startBtn.textContent = '🔄 Try Again';
                startBtn.className = 'start-btn';
                startBtn.disabled = false;
                reactionCircle.style.cursor = 'pointer';

                // Add to attempts
                attempts.push(reactionMs);
                if (attempts.length > maxAttemptsDisplay) {
                    attempts.shift();
                }
                updateStatsDisplay();
            }

            function updateStatsDisplay() {
                if (attempts.length === 0) {
                    noAttemptsMsg.style.display = 'inline';
                    attemptsContainer.innerHTML = '';
                    attemptsContainer.style.display = 'none';
                    avgDisplay.textContent = '';
                    return;
                }
                noAttemptsMsg.style.display = 'none';
                attemptsContainer.style.display = 'flex';
                attemptsContainer.innerHTML = attempts
                    .map((ms, i) => {
                        const rc = getReactionClass(ms);
                        return `<span class="attempt-badge ${rc}" title="Attempt ${i + 1}: ${ms}ms">${ms}</span>`;
                    })
                    .join('');

                const avg = Math.round(attempts.reduce((a, b) => a + b, 0) / attempts.length);
                const best = Math.min(...attempts);
                const avgClass = getReactionClass(avg);
                const bestClass = getReactionClass(best);
                avgDisplay.innerHTML = `
                    <span style="margin-right:12px;">📊 <strong>Avg:</strong> <span class="${getReactionColorClass(avg)}">${avg}ms</span> (${avgClass})</span>
                    <span>🥇 <strong>Best:</strong> <span class="${getReactionColorClass(best)}">${best}ms</span> (${bestClass})</span>
                    <span style="margin-left:12px;">🔢 <strong>Attempts:</strong> ${attempts.length}</span>
                `;
            }

            function restoreCircleContent() {
                circleContent.innerHTML = `
                    <div class="circle-icon" id="circleIcon">🎯</div>
                    <div class="circle-text" id="circleLabel">Ready?</div>
                `;
                // Re-assign references since innerHTML replaced them
                window._circleIcon = document.getElementById('circleIcon');
                window._circleLabel = document.getElementById('circleLabel');
            }

            // --- Start the test ---
            function startTest() {
                // Clear any existing timeout
                if (waitTimeoutId) {
                    clearTimeout(waitTimeoutId);
                    waitTimeoutId = null;
                }

                // Restore circle content if needed
                if (currentState === STATE.RESULT || currentState === STATE.TOO_EARLY) {
                    restoreCircleContent();
                    // Update local refs for this cycle
                    window._circleIcon = document.getElementById('circleIcon');
                    window._circleLabel = document.getElementById('circleLabel');
                }

                currentState = STATE.WAITING;
                signalTimestamp = null;
                setCircleState('waiting');

                const iconEl = document.getElementById('circleIcon') || window._circleIcon;
                const labelEl = document.getElementById('circleLabel') || window._circleLabel;

                if (iconEl) iconEl.textContent = '⏳';
                if (labelEl) {
                    labelEl.textContent = 'Wait...';
                    labelEl.style.color = '';
                }
                if (iconEl) iconEl.style.color = '';

                statusText.textContent = 'Waiting for the signal... Don\'t click yet!';
                statusText.className = 'status-text waiting-status';
                startBtn.textContent = '⏳ Waiting...';
                startBtn.className = 'start-btn';
                startBtn.disabled = true;
                reactionCircle.style.cursor = 'pointer';

                // Random delay between minWaitTime and maxWaitTime
                const delay = minWaitTime + Math.random() * (maxWaitTime - minWaitTime);

                waitTimeoutId = setTimeout(() => {
                    triggerSignal();
                }, delay);
            }

            function triggerSignal() {
                if (currentState !== STATE.WAITING) return;
                currentState = STATE.READY;
                signalTimestamp = performance.now();
                waitTimeoutId = null;

                setCircleState('ready');

                const iconEl = document.getElementById('circleIcon') || window._circleIcon;
                const labelEl = document.getElementById('circleLabel') || window._circleLabel;

                if (iconEl) {
                    iconEl.textContent = '!';
                    iconEl.style.color = '';
                }
                if (labelEl) {
                    labelEl.textContent = 'CLICK NOW!';
                    labelEl.style.color = '';
                }

                statusText.textContent = '❗ CLICK NOW!';
                statusText.className = 'status-text ready-status';
                startBtn.textContent = '⏳ Waiting for click...';
                startBtn.className = 'start-btn';
                startBtn.disabled = true;
                reactionCircle.style.cursor = 'pointer';
            }

            function handleClick() {
                switch (currentState) {
                    case STATE.IDLE:
                        // Start the test on click when idle
                        startTest();
                        break;
                    case STATE.WAITING:
                        // Clicked too early
                        showTooEarly();
                        break;
                    case STATE.READY:
                        // Calculate reaction time
                        if (signalTimestamp !== null) {
                            const reactionMs = Math.round(performance.now() - signalTimestamp);
                            showResult(reactionMs);
                        }
                        break;
                    case STATE.TOO_EARLY:
                        // Restart
                        restoreCircleContent();
                        resetToIdle();
                        setTimeout(() => startTest(), 100);
                        break;
                    case STATE.RESULT:
                        // Restart for new attempt
                        restoreCircleContent();
                        resetToIdle();
                        setTimeout(() => startTest(), 100);
                        break;
                    default:
                        break;
                }
            }

            // --- Event Listeners ---
            reactionCircle.addEventListener('click', (e) => {
                e.preventDefault();
                handleClick();
            });

            // Prevent double-tap zoom on mobile for the circle
            reactionCircle.addEventListener('touchstart', (e) => {
                if (currentState === STATE.WAITING || currentState === STATE.READY) {
                    e.preventDefault();
                }
            }, { passive: false });

            reactionCircle.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleClick();
            });

            // Keyboard support (Spacebar)
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    if (currentState === STATE.IDLE) {
                        startTest();
                    } else if (currentState === STATE.WAITING) {
                        showTooEarly();
                    } else if (currentState === STATE.READY) {
                        if (signalTimestamp !== null) {
                            const reactionMs = Math.round(performance.now() - signalTimestamp);
                            showResult(reactionMs);
                        }
                    } else if (currentState === STATE.TOO_EARLY || currentState === STATE.RESULT) {
                        restoreCircleContent();
                        resetToIdle();
                        setTimeout(() => startTest(), 100);
                    }
                }
            });

            // Start button
            startBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (currentState === STATE.IDLE) {
                    startTest();
                } else if (currentState === STATE.TOO_EARLY || currentState === STATE.RESULT) {
                    restoreCircleContent();
                    resetToIdle();
                    setTimeout(() => startTest(), 100);
                }
            });

            // Option buttons
            opt5.addEventListener('click', () => {
                if (currentState === STATE.WAITING || currentState === STATE.READY) return; // Don't change during active test
                maxWaitTime = 5000;
                opt5.classList.add('active');
                opt10.classList.remove('active');
                statusText.textContent = 'Max wait: 5 seconds. Press Start when ready!';
                statusText.className = 'status-text';
            });

            opt10.addEventListener('click', () => {
                if (currentState === STATE.WAITING || currentState === STATE.READY) return;
                maxWaitTime = 10000;
                opt10.classList.add('active');
                opt5.classList.remove('active');
                statusText.textContent = 'Max wait: 10 seconds. Press Start when ready!';
                statusText.className = 'status-text';
            });

            // --- Initialize ---
            resetToIdle();
            updateStatsDisplay();

            // Store refs for dynamic content
            window._circleIcon = circleIcon;
            window._circleLabel = circleLabel;

            console.log('🚀 Reaction Speed Test ready!');
            console.log('   - Click the circle or press Spacebar to start');
            console.log('   - Wait for the "!" to appear, then click/press Space as fast as you can');
            console.log('   - Options: 5-second or 10-second max random wait');
            console.log('   - Your reaction time will be measured in milliseconds');
        })();
    </script>
</body>
</html>
