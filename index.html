<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Block Tales • Dodge Master</title>
    <!-- Pixel font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1308;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
            color: #eed;
            image-rendering: pixelated;
            user-select: none;
        }

        .game-container {
            max-width: 480px;
            width: 100%;
            background: #332111;
            border: 6px solid #5a3a1e;
            box-shadow: 0 0 0 4px #1e1308, 0 10px 20px rgba(0,0,0,0.5);
            padding: 1.2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-radius: 8px;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            color: #f7d44a;
            text-shadow: 3px 3px 0 #4a2c0f;
            letter-spacing: 1px;
            line-height: 1.5;
            margin-bottom: -0.3rem;
        }

        .enemy-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: #2b1a0b;
            border: 4px solid #5a3a1e;
            padding: 0.4rem 0.8rem;
            border-radius: 0;
            box-shadow: inset 0 -4px 0 #1e1308;
        }

        .enemy-sprite {
            font-size: 2.8rem;
            filter: drop-shadow(0 6px 2px rgba(0,0,0,0.7));
            transition: transform 0.1s ease;
        }
        .enemy-sprite.windup {
            animation: wiggle 0.4s infinite;
        }
        .enemy-sprite.attack {
            animation: lunge 0.15s ease-out;
        }
        @keyframes wiggle {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-4px) rotate(-3deg); }
            75% { transform: translateX(4px) rotate(3deg); }
        }
        @keyframes lunge {
            0% { transform: scale(1); }
            50% { transform: scale(1.5) translateY(-6px); }
            100% { transform: scale(1.1) translateY(2px); }
        }

        .enemy-name {
            font-size: 0.6rem;
            color: #f7d44a;
            background: #1e1308;
            padding: 0.3rem 0.6rem;
            border: 2px solid #5a3a1e;
        }

        .health-row {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .hp-label {
            font-size: 0.7rem;
        }
        .hp-bar-bg {
            flex: 1;
            height: 18px;
            background: #551111;
            border: 3px solid #2b1a0b;
            box-shadow: inset 0 2px 0 #330000;
        }
        .hp-bar-fill {
            height: 100%;
            width: 100%;
            background: #4ae04a;
            transition: width 0.2s ease, background 0.2s;
            box-shadow: 0 0 8px #2e2;
        }
        .hp-bar-fill.danger {
            background: #ff4444;
            box-shadow: 0 0 10px #f44;
        }

        .shield-area {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .shield-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #3e2b17;
            border: 8px solid #6b4d29;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 0 0 4px #1e1308, inset 0 0 20px rgba(0,0,0,0.6);
            position: relative;
        }
        .shield-circle:active {
            transform: scale(0.94);
        }
        .shield-circle.waiting {
            border-color: #d44;
            box-shadow: 0 0 25px #d44;
        }
        .shield-circle.ready {
            border-color: #ff0;
            background: #3a5a2a;
            box-shadow: 0 0 45px #ff0, 0 0 80px #ffaa00;
            animation: pulse-shield 0.3s;
        }
        .shield-circle.flinch {
            border-color: #fa0;
            background: #5a4a20;
        }
        .shield-circle.dodge-perfect {
            border-color: #fff;
            background: #2a4a2a;
        }
        .shield-circle.dodge-good {
            border-color: #6cf;
            background: #1a2a3a;
        }
        .shield-circle.dodge-miss {
            border-color: #f55;
            background: #4a2020;
        }
        @keyframes pulse-shield {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .shield-icon {
            font-size: 3.5rem;
            text-shadow: 0 0 10px #000;
        }

        .status-text {
            font-size: 0.6rem;
            text-align: center;
            min-height: 2.4rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .option-btn {
            background: #4a2a10;
            border: 3px solid #6b4d29;
            color: #eed;
            font-family: inherit;
            font-size: 0.55rem;
            padding: 0.5rem 0.8rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #2b1a0b;
            transition: 0.1s;
        }
        .option-btn.active {
            background: #f7d44a;
            border-color: #fff;
            color: #1e1308;
            box-shadow: 0 0 10px #f7d44a;
        }
        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2b1a0b;
        }

        .action-btn {
            background: #d44;
            border: none;
            border-bottom: 6px solid #822;
            color: white;
            font-family: inherit;
            font-size: 0.7rem;
            padding: 0.8rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: 0.08s;
            box-shadow: 0 4px 0 #2b1a0b;
        }
        .action-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .action-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .attempts-box {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            justify-content: center;
            background: #1e1308;
            border: 3px solid #5a3a1e;
            padding: 0.4rem;
            min-height: 2.5rem;
            align-items: center;
        }
        .badge {
            font-size: 0.45rem;
            padding: 0.2rem 0.5rem;
            border: 2px solid;
            background: #2b1a0b;
        }
        .badge-perfect { border-color: #ff0; color: #ff0; }
        .badge-good { border-color: #6cf; color: #6cf; }
        .badge-miss { border-color: #f55; color: #f55; }
        .badge-flinch { border-color: #fa0; color: #fa0; }

        .stats-line {
            font-size: 0.5rem;
            text-align: center;
            color: #bbaa88;
        }

        @media (max-width: 400px) {
            .shield-circle {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>⚔️ BLOCK TALES<br>DODGE TEST</h1>

    <!-- enemy -->
    <div class="enemy-panel">
        <span class="enemy-sprite" id="enemySprite">🟢</span>
        <span class="enemy-name" id="enemyName">SLIME</span>
    </div>

    <!-- HP -->
    <div class="health-row">
        <span class="hp-label">❤️</span>
        <div class="hp-bar-bg">
            <div class="hp-bar-fill" id="hpFill"></div>
        </div>
        <span id="hpText" style="font-size:0.5rem;">100/100</span>
    </div>

    <!-- Dodge circle -->
    <div class="shield-area">
        <div class="shield-circle" id="shieldCircle">
            <span class="shield-icon" id="shieldIcon">🛡️</span>
        </div>
    </div>

    <div class="status-text" id="statusText">Face the enemy! Press START</div>

    <!-- windup speed -->
    <div class="options">
        <button class="option-btn active" data-time="5000">⚡ FAST WINDUP</button>
        <button class="option-btn" data-time="10000">🐌 SLOW WINDUP</button>
    </div>

    <button class="action-btn" id="actionBtn">⚔️ START BATTLE</button>

    <div class="attempts-box" id="attemptsBox">
        <span id="noAttempts" style="font-size:0.5rem;">No dodges yet</span>
    </div>
    <div class="stats-line" id="statsLine"></div>
    <div style="font-size:0.4rem; color:#7a6a5a; text-align:center;">
        <span style="border:1px solid #5a3a1e; padding:2px 6px;">SPACE</span> or <span style="border:1px solid #5a3a1e; padding:2px 6px;">CLICK</span> to dodge
    </div>
</div>

<script>
    (function() {
        // --- DOM refs ---
        const shieldCircle = document.getElementById('shieldCircle');
        const shieldIcon = document.getElementById('shieldIcon');
        const statusText = document.getElementById('statusText');
        const actionBtn = document.getElementById('actionBtn');
        const enemySprite = document.getElementById('enemySprite');
        const enemyName = document.getElementById('enemyName');
        const hpFill = document.getElementById('hpFill');
        const hpText = document.getElementById('hpText');
        const attemptsBox = document.getElementById('attemptsBox');
        const noAttemptsSpan = document.getElementById('noAttempts');
        const statsLine = document.getElementById('statsLine');
        const optFast = document.querySelector('[data-time="5000"]');
        const optSlow = document.querySelector('[data-time="10000"]');

        // --- Game state ---
        const MAX_HP = 100;
        let hp = MAX_HP;
        let maxWindupTime = 5000;        // 5s default
        const MIN_WINDUP = 1000;         // minimum delay before exclamation
        let currentPhase = 'idle';       // idle | waiting | ready | flinch | result | gameover
        let windupTimer = null;
        let signalTimestamp = null;
        let attempts = [];               // { outcome: 'perfect'|'good'|'miss'|'flinch', ms: number|null }

        // --- Helper functions ---
        function updateHPDisplay() {
            let percent = (hp / MAX_HP) * 100;
            hpFill.style.width = percent + '%';
            hpText.textContent = `${hp}/${MAX_HP}`;
            if (percent < 25) {
                hpFill.classList.add('danger');
            } else {
                hpFill.classList.remove('danger');
            }
        }

        function resetHP() {
            hp = MAX_HP;
            updateHPDisplay();
        }

        function applyDamage(dmg) {
            hp = Math.max(0, hp - dmg);
            updateHPDisplay();
            if (hp <= 0) {
                gameOver();
                return true;
            }
            return false;
        }

        function gameOver() {
            clearWindup();
            currentPhase = 'gameover';
            setShieldVisual('idle');
            shieldIcon.textContent = '💀';
            statusText.textContent = 'You fell... Press RESTART to try again.';
            actionBtn.textContent = '🔄 RESTART';
            actionBtn.disabled = false;
            enemySprite.classList.remove('windup', 'attack');
            enemyName.textContent = 'DEFEATED';
        }

        function clearWindup() {
            if (windupTimer) {
                clearTimeout(windupTimer);
                windupTimer = null;
            }
        }

        function setShieldVisual(style) {
            shieldCircle.className = 'shield-circle ' + style;
        }

        function startBattle() {
            // Reset if gameover or idle
            if (hp <= 0) {
                resetHP();
                attempts = [];
                renderAttempts();
            }
            clearWindup();
            currentPhase = 'waiting';
            setShieldVisual('waiting');
            shieldIcon.textContent = '⏳';
            statusText.textContent = 'Enemy is winding up... wait!';
            actionBtn.textContent = '...';
            actionBtn.disabled = true;
            enemySprite.classList.add('windup');
            enemySprite.classList.remove('attack');
            enemyName.textContent = 'SLIME';

            const delay = MIN_WINDUP + Math.random() * (maxWindupTime - MIN_WINDUP);
            windupTimer = setTimeout(() => {
                showExclamation();
            }, delay);
        }

        function showExclamation() {
            if (currentPhase !== 'waiting') return;
            currentPhase = 'ready';
            signalTimestamp = performance.now();
            windupTimer = null;
            setShieldVisual('ready');
            shieldIcon.textContent = '❗';
            statusText.textContent = '❗ DODGE NOW! ❗';
            actionBtn.disabled = true;
            enemySprite.classList.remove('windup');
            enemySprite.classList.add('attack');
            enemyName.textContent = 'SLIME';
        }

        function handlePlayerAction() {
            switch (currentPhase) {
                case 'idle':
                    startBattle();
                    break;
                case 'waiting':
                    // clicked too early = flinch
                    flinch();
                    break;
                case 'ready':
                    // measure reaction
                    if (signalTimestamp) {
                        let ms = Math.round(performance.now() - signalTimestamp);
                        resolveDodge(ms);
                    }
                    break;
                case 'flinch':
                case 'result':
                    // After a short pause, auto restart if alive
                    resetToIdle();
                    if (hp > 0) startBattle();
                    break;
                case 'gameover':
                    // restart from game over
                    resetHP();
                    attempts = [];
                    renderAttempts();
                    resetToIdle();
                    startBattle();
                    break;
            }
        }

        function flinch() {
            clearWindup();
            currentPhase = 'flinch';
            signalTimestamp = null;
            setShieldVisual('flinch');
            shieldIcon.textContent = '😵';
            statusText.textContent = 'Too early! You flinched (-10 HP).';
            actionBtn.textContent = '↺ Retry';
            actionBtn.disabled = false;
            enemySprite.classList.remove('windup', 'attack');
            enemyName.textContent = 'SLIME';
            applyDamage(10);
            attempts.push({ outcome: 'flinch', ms: null });
            renderAttempts();
            // auto reset after 1.5s if still alive
            setTimeout(() => {
                if (currentPhase === 'flinch' && hp > 0) {
                    resetToIdle();
                }
            }, 1500);
        }

        function resolveDodge(ms) {
            let outcome, dmg, label, visualClass;
            if (ms <= 200) {
                outcome = 'perfect';
                dmg = 0;
                label = 'PERFECT DODGE!';
                visualClass = 'dodge-perfect';
                shieldIcon.textContent = '✨';
            } else if (ms <= 450) {
                outcome = 'good';
                dmg = 5;
                label = 'GOOD DODGE';
                visualClass = 'dodge-good';
                shieldIcon.textContent = '👍';
            } else {
                outcome = 'miss';
                dmg = 20;
                label = 'MISS!';
                visualClass = 'dodge-miss';
                shieldIcon.textContent = '💥';
            }

            currentPhase = 'result';
            setShieldVisual(visualClass);
            statusText.textContent = `${label} (${ms}ms) -${dmg} HP`;
            actionBtn.textContent = '↺ Next Attack';
            actionBtn.disabled = false;
            enemySprite.classList.remove('windup', 'attack');
            enemyName.textContent = 'SLIME';

            applyDamage(dmg);
            attempts.push({ outcome: outcome, ms: ms });
            if (attempts.length > 8) attempts.shift();
            renderAttempts();

            // auto return to idle after a moment
            setTimeout(() => {
                if (currentPhase === 'result' && hp > 0) {
                    resetToIdle();
                }
            }, 1600);
        }

        function resetToIdle() {
            clearWindup();
            currentPhase = 'idle';
            setShieldVisual('idle');
            shieldIcon.textContent = '🛡️';
            statusText.textContent = 'Ready for next attack.';
            actionBtn.textContent = '⚔️ START BATTLE';
            actionBtn.disabled = false;
            enemySprite.classList.remove('windup', 'attack');
            enemyName.textContent = 'SLIME';
        }

        function renderAttempts() {
            if (attempts.length === 0) {
                noAttemptsSpan.style.display = 'inline';
                attemptsBox.innerHTML = '';
                attemptsBox.appendChild(noAttemptsSpan);
                statsLine.textContent = '';
                return;
            }
            // Remove no-attempts span if present
            if (noAttemptsSpan.parentNode === attemptsBox) {
                noAttemptsSpan.style.display = 'none';
            }
            let html = '';
            attempts.forEach(a => {
                let cls = '';
                if (a.outcome === 'perfect') cls = 'badge-perfect';
                else if (a.outcome === 'good') cls = 'badge-good';
                else if (a.outcome === 'miss') cls = 'badge-miss';
                else if (a.outcome === 'flinch') cls = 'badge-flinch';
                let txt = a.outcome === 'flinch' ? 'FL' : (a.ms !== null ? a.ms : '?');
                html += `<span class="badge ${cls}">${txt}</span>`;
            });
            attemptsBox.innerHTML = html;

            // stats
            const reactionTimes = attempts.filter(a => a.ms !== null).map(a => a.ms);
            if (reactionTimes.length > 0) {
                let avg = Math.round(reactionTimes.reduce((s,v)=>s+v,0)/reactionTimes.length);
                let best = Math.min(...reactionTimes);
                statsLine.textContent = `Avg: ${avg}ms | Best: ${best}ms | Dodges: ${attempts.length}`;
            } else {
                statsLine.textContent = `Attempts: ${attempts.length}`;
            }
        }

        // --- Event binding ---
        shieldCircle.addEventListener('click', (e) => {
            e.preventDefault();
            handlePlayerAction();
        });
        shieldCircle.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handlePlayerAction();
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                handlePlayerAction();
            }
        });

        actionBtn.addEventListener('click', () => {
            if (currentPhase === 'idle' || currentPhase === 'gameover') {
                if (hp <= 0) {
                    resetHP();
                    attempts = [];
                    renderAttempts();
                }
                resetToIdle();
                startBattle();
            } else if (currentPhase === 'flinch' || currentPhase === 'result') {
                resetToIdle();
                if (hp > 0) startBattle();
            }
        });

        optFast.addEventListener('click', () => {
            if (currentPhase === 'waiting' || currentPhase === 'ready') return;
            maxWindupTime = 5000;
            optFast.classList.add('active');
            optSlow.classList.remove('active');
        });
        optSlow.addEventListener('click', () => {
            if (currentPhase === 'waiting' || currentPhase === 'ready') return;
            maxWindupTime = 10000;
            optSlow.classList.add('active');
            optFast.classList.remove('active');
        });

        // initial setup
        resetToIdle();
        resetHP();
        renderAttempts();
    })();
</script>
</body>
</html>
