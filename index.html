<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Block Tales · Duel in the Meadow</title>
    <!-- Pixel font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #222034;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
            image-rendering: pixelated;
        }

        /* Game window */
        .game-world {
            position: relative;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16 / 9;
            background: linear-gradient(180deg, #6dc5ff 0%, #a5e0ff 30%, #c0e8ff 100%);
            border: 6px solid #4a3620;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 0 4px #1a1208, 0 20px 30px rgba(0,0,0,0.5);
            margin: 0 auto;
        }

        /* Sky & scenery */
        .sky {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, #fff9c4, transparent 35%);
            pointer-events: none;
        }
        .sun {
            position: absolute;
            top: 8%;
            left: 15%;
            width: 60px;
            height: 60px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 40px #ffeb3b;
            pointer-events: none;
        }
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 40% 50% 30% 60%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .cloud1 {
            width: 100px;
            height: 40px;
            top: 15%;
            left: 55%;
            animation: float 8s infinite alternate ease-in-out;
        }
        .cloud2 {
            width: 80px;
            height: 30px;
            top: 25%;
            left: 70%;
            animation: float 10s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translateX(0); }
            100% { transform: translateX(-25px); }
        }

        /* Ground & foliage */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(180deg, #5b8c2a 0%, #3c6018 30%, #2d4510 100%);
            border-top: 4px solid #8bc34a;
            box-shadow: inset 0 10px 15px rgba(0,0,0,0.3);
        }
        .bush {
            position: absolute;
            bottom: 18%;
            background: #2e5c1a;
            border-radius: 50% 50% 10% 10%;
            box-shadow: 0 8px 0 #1e3b0e, 0 0 15px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .bush1 {
            left: 10%;
            width: 80px;
            height: 50px;
        }
        .bush2 {
            right: 8%;
            width: 90px;
            height: 55px;
        }
        .tree {
            position: absolute;
            bottom: 20%;
            width: 30px;
            height: 70px;
            background: #5d3a1a;
            border-radius: 5px;
            box-shadow: 0 6px 0 #3d2510;
            pointer-events: none;
        }
        .tree1 { left: 5%; }
        .tree2 { right: 5%; }
        .tree::after {
            content: '';
            position: absolute;
            top: -30px;
            left: -15px;
            width: 60px;
            height: 50px;
            background: #2e6b1f;
            border-radius: 50%;
            box-shadow: 0 5px 0 #1e4a12;
        }

        /* Characters area */
        .battle-row {
            position: absolute;
            bottom: 25%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 8%;
            pointer-events: none;
        }

        .character {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .health-bar-bg {
            width: 90px;
            height: 14px;
            background: #551111;
            border: 2px solid #1a1208;
            margin-bottom: 6px;
            box-shadow: inset 0 2px 0 #330000;
        }
        .health-fill {
            height: 100%;
            width: 100%;
            background: #4ae04a;
            transition: width 0.25s ease, background 0.2s;
        }
        .health-fill.danger {
            background: #ff4444;
        }
        .char-name {
            font-size: 0.55rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 4px;
        }
        .sprite {
            font-size: 3.5rem;
            filter: drop-shadow(0 8px 4px rgba(0,0,0,0.5));
            transition: transform 0.1s ease;
        }
        .enemy-sprite.windup {
            animation: enemyWiggle 0.5s infinite;
        }
        .enemy-sprite.attacking {
            animation: enemyLunge 0.15s ease-out;
        }
        @keyframes enemyWiggle {
            0%,100% { transform: translateX(0); }
            50% { transform: translateX(-6px); }
        }
        @keyframes enemyLunge {
            0% { transform: scale(1); }
            60% { transform: scale(1.5) translateX(-10px); }
            100% { transform: scale(1.1) translateX(2px); }
        }

        /* Dodge prompt area */
        .dodge-zone {
            position: absolute;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }
        .dodge-button {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #3e2b17;
            border: 6px solid #6b4d29;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            box-shadow: 0 0 0 4px #1a1208, 0 8px 20px rgba(0,0,0,0.7);
            transition: 0.1s linear;
            color: #eed;
        }
        .dodge-button:active {
            transform: scale(0.9);
        }
        .dodge-button.waiting {
            border-color: #d44;
            box-shadow: 0 0 30px #d44;
        }
        .dodge-button.ready {
            border-color: #ff0;
            background: #3a5a2a;
            box-shadow: 0 0 45px #ff0;
            animation: pulseBtn 0.3s;
        }
        @keyframes pulseBtn {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* UI text */
        .game-message {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
        }

        .control-panel {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
        }
        .option-btn, .action-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            padding: 6px 12px;
            background: #4a2a10;
            border: 3px solid #6b4d29;
            color: #eed;
            cursor: pointer;
            box-shadow: 0 4px 0 #2b1a0b;
            transition: 0.1s;
        }
        .option-btn.active {
            background: #f7d44a;
            border-color: #fff;
            color: #1e1308;
        }
        .action-btn {
            background: #d44;
            border-bottom: 4px solid #822;
            color: white;
        }

        .stats {
            position: absolute;
            top: 2%;
            right: 3%;
            font-size: 0.45rem;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            text-align: right;
            pointer-events: none;
        }

        /* Responsive scaling */
        @media (max-width: 500px) {
            .game-world {
                aspect-ratio: 4 / 3;
            }
            .sprite {
                font-size: 2.8rem;
            }
            .dodge-button {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="game-world">
    <!-- Scenery layers (non-interactive) -->
    <div class="sky"></div>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="ground"></div>
    <div class="bush bush1"></div>
    <div class="bush bush2"></div>
    <div class="tree tree1"></div>
    <div class="tree tree2"></div>

    <!-- Game message -->
    <div class="game-message" id="gameMessage">⚔️ Duel in the Meadow ⚔️</div>

    <!-- Stats (attacks survived) -->
    <div class="stats" id="statsDisplay">Attacks: 0</div>

    <!-- Battle row: enemy (left) and player (right) -->
    <div class="battle-row">
        <div class="character" id="enemyChar">
            <div class="char-name" id="enemyName">BANDIT</div>
            <div class="health-bar-bg">
                <div class="health-fill" id="enemyHpFill" style="width:100%"></div>
            </div>
            <span class="sprite enemy-sprite" id="enemySprite">🦝</span>
        </div>
        <div class="character" id="playerChar">
            <div class="char-name">HERO</div>
            <div class="health-bar-bg">
                <div class="health-fill" id="playerHpFill" style="width:100%"></div>
            </div>
            <span class="sprite" id="playerSprite">🛡️</span>
        </div>
    </div>

    <!-- Dodge button (central) -->
    <div class="dodge-zone">
        <div class="dodge-button" id="dodgeBtn">🛡️</div>
    </div>

    <!-- Controls at bottom -->
    <div class="control-panel">
        <button class="option-btn active" id="optFast">⚡ FAST</button>
        <button class="option-btn" id="optSlow">🐌 SLOW</button>
        <button class="action-btn" id="restartBtn">🔄 RESTART</button>
    </div>
</div>

<script>
    (function() {
        // --- DOM refs ---
        const dodgeBtn = document.getElementById('dodgeBtn');
        const enemySprite = document.getElementById('enemySprite');
        const enemyName = document.getElementById('enemyName');
        const enemyHpFill = document.getElementById('enemyHpFill');
        const playerHpFill = document.getElementById('playerHpFill');
        const gameMessage = document.getElementById('gameMessage');
        const statsDisplay = document.getElementById('statsDisplay');
        const optFast = document.getElementById('optFast');
        const optSlow = document.getElementById('optSlow');
        const restartBtn = document.getElementById('restartBtn');

        // --- Audio (simple beeps) ---
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {}
        }
        function playBeep(freq, dur, type='square', vol=0.08) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        // --- Game state ---
        const MAX_HP = 100;
        let playerHp = MAX_HP;
        let enemyHp = MAX_HP;
        let maxWindup = 5000;       // ms
        const MIN_WINDUP = 1000;
        let phase = 'idle';         // idle, waiting, ready, flinch, result, gameover, victory
        let windupTimer = null;
        let signalTime = null;
        let attackCount = 0;
        const enemyType = { name: 'BANDIT', sprite: '🦝' };

        // --- Helper functions ---
        function updateHpBars() {
            let pPercent = (playerHp / MAX_HP) * 100;
            playerHpFill.style.width = pPercent + '%';
            playerHpFill.classList.toggle('danger', pPercent < 25);

            let ePercent = (enemyHp / MAX_HP) * 100;
            enemyHpFill.style.width = ePercent + '%';
            enemyHpFill.classList.toggle('danger', ePercent < 25);
        }

        function setMessage(text) {
            gameMessage.textContent = text;
        }

        function clearWindup() {
            if (windupTimer) {
                clearTimeout(windupTimer);
                windupTimer = null;
            }
        }

        function gameOver() {
            clearWindup();
            phase = 'gameover';
            dodgeBtn.className = 'dodge-button';
            dodgeBtn.textContent = '💀';
            enemySprite.classList.remove('windup', 'attacking');
            setMessage('DEFEATED... Press RESTART');
            playBeep(150, 0.4, 'sawtooth', 0.1);
            playBeep(100, 0.6, 'triangle', 0.08);
        }

        function victory() {
            clearWindup();
            phase = 'victory';
            dodgeBtn.className = 'dodge-button';
            dodgeBtn.textContent = '🏆';
            enemySprite.classList.remove('windup', 'attacking');
            setMessage('VICTORY! You win!');
            playBeep(523, 0.15);
            setTimeout(() => playBeep(659, 0.15), 150);
            setTimeout(() => playBeep(784, 0.2), 300);
        }

        function startWindup() {
            if (phase === 'gameover' || phase === 'victory') return;
            clearWindup();
            phase = 'waiting';
            dodgeBtn.className = 'dodge-button waiting';
            dodgeBtn.textContent = '⏳';
            enemySprite.classList.add('windup');
            enemySprite.classList.remove('attacking');
            setMessage('Bandit is winding up...');
            const delay = MIN_WINDUP + Math.random() * (maxWindup - MIN_WINDUP);
            windupTimer = setTimeout(() => {
                showExclamation();
            }, delay);
        }

        function showExclamation() {
            if (phase !== 'waiting') return;
            phase = 'ready';
            signalTime = performance.now();
            dodgeBtn.className = 'dodge-button ready';
            dodgeBtn.textContent = '❗';
            enemySprite.classList.remove('windup');
            enemySprite.classList.add('attacking');
            setMessage('DODGE NOW!');
            playBeep(800, 0.08, 'square', 0.07);
        }

        function handleDodge() {
            initAudio();
            switch (phase) {
                case 'idle':
                    // Start duel if not yet begun
                    startWindup();
                    break;
                case 'waiting':
                    flinch();
                    break;
                case 'ready':
                    if (signalTime) {
                        let reactionMs = Math.round(performance.now() - signalTime);
                        resolveDodge(reactionMs);
                    }
                    break;
                case 'flinch':
                case 'result':
                    // automatically proceed to next attack after a short delay if alive
                    // do nothing, the auto-loop will handle it
                    break;
                case 'gameover':
                case 'victory':
                    restartGame();
                    break;
            }
        }

        function flinch() {
            clearWindup();
            phase = 'flinch';
            dodgeBtn.className = 'dodge-button';
            dodgeBtn.textContent = '😵';
            enemySprite.classList.remove('windup', 'attacking');
            setMessage('Too early! You flinch (-10 HP)');
            playerHp = Math.max(0, playerHp - 10);
            updateHpBars();
            attackCount++;
            statsDisplay.textContent = 'Attacks: ' + attackCount;
            playBeep(200, 0.2, 'triangle', 0.1);
            if (playerHp <= 0) {
                gameOver();
                return;
            }
            // Auto-advance after 1.5s
            setTimeout(() => {
                if (phase === 'flinch' && playerHp > 0) {
                    phase = 'idle';
                    startWindup();
                }
            }, 1500);
        }

        function resolveDodge(reactionMs) {
            let outcome, dmgToEnemy, dmgToPlayer, msg, icon;
            // Tiers based on reaction time
            if (reactionMs <= 200) {
                outcome = 'perfect';
                dmgToEnemy = 30;
                dmgToPlayer = 0;
                msg = `PERFECT! ${reactionMs}ms -30 ENEMY HP`;
                icon = '✨';
                playBeep(1000, 0.1, 'square', 0.09);
            } else if (reactionMs <= 300) {
                outcome = 'great';
                dmgToEnemy = 20;
                dmgToPlayer = 0;
                msg = `GREAT! ${reactionMs}ms -20 ENEMY HP`;
                icon = '🔥';
                playBeep(800, 0.1, 'square', 0.07);
            } else if (reactionMs <= 400) {
                outcome = 'good';
                dmgToEnemy = 10;
                dmgToPlayer = 0;
                msg = `GOOD! ${reactionMs}ms -10 ENEMY HP`;
                icon = '👍';
                playBeep(600, 0.1, 'square', 0.07);
            } else {
                outcome = 'miss';
                dmgToEnemy = 0;
                dmgToPlayer = 15;
                msg = `MISS! ${reactionMs}ms -15 YOUR HP`;
                icon = '💥';
                playBeep(250, 0.25, 'sawtooth', 0.1);
            }

            phase = 'result';
            dodgeBtn.className = 'dodge-button';
            dodgeBtn.textContent = icon;
            enemySprite.classList.remove('windup', 'attacking');

            // Apply damage
            enemyHp = Math.max(0, enemyHp - dmgToEnemy);
            playerHp = Math.max(0, playerHp - dmgToPlayer);
            updateHpBars();
            attackCount++;
            statsDisplay.textContent = 'Attacks: ' + attackCount;
            setMessage(msg);

            // Check win/lose
            if (enemyHp <= 0) {
                victory();
                return;
            }
            if (playerHp <= 0) {
                gameOver();
                return;
            }

            // Auto next attack after delay
            setTimeout(() => {
                if (phase === 'result' && playerHp > 0 && enemyHp > 0) {
                    phase = 'idle';
                    startWindup();
                }
            }, 1600);
        }

        function restartGame() {
            clearWindup();
            playerHp = MAX_HP;
            enemyHp = MAX_HP;
            attackCount = 0;
            phase = 'idle';
            updateHpBars();
            dodgeBtn.className = 'dodge-button';
            dodgeBtn.textContent = '🛡️';
            enemySprite.classList.remove('windup', 'attacking');
            enemyName.textContent = enemyType.name;
            enemySprite.textContent = enemyType.sprite;
            setMessage('⚔️ Duel in the Meadow ⚔️');
            statsDisplay.textContent = 'Attacks: 0';
        }

        // --- Event listeners ---
        dodgeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            handleDodge();
        });
        dodgeBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleDodge();
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                handleDodge();
            }
        });

        restartBtn.addEventListener('click', restartGame);

        optFast.addEventListener('click', () => {
            if (phase === 'waiting' || phase === 'ready') return;
            maxWindup = 5000;
            optFast.classList.add('active');
            optSlow.classList.remove('active');
        });
        optSlow.addEventListener('click', () => {
            if (phase === 'waiting' || phase === 'ready') return;
            maxWindup = 10000;
            optSlow.classList.add('active');
            optFast.classList.remove('active');
        });

        // Initial setup
        restartGame();
    })();
</script>
</body>
</html>
