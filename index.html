<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Tales – Dodge Reaction Test</title>
    <!-- pixel font for retro feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #2b1e10;
            --surface: #3a2c1b;
            --text: #f5e6d3;
            --accent: #d4a017;
            --accent-hover: #e0b040;
            --red: #c0392b;
            --green: #27ae60;
            --yellow: #f1c40f;
            --blue: #3498db;
            --hp-green: #2ecc71;
            --hp-red: #e74c3c;
            --circle-size: min(260px, 60vw);
            --pixel-border: 4px solid #5c3e1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(212, 160, 23, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(192, 57, 43, 0.06) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 16px;
            image-rendering: pixelated;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 500px;
        }

        /* title */
        .title {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 400;
            letter-spacing: 2px;
            text-align: center;
            color: #f5e6d3;
            text-shadow: 3px 3px 0 #5c3e1f;
            line-height: 1.4;
            background: linear-gradient(180deg, #f9e4a0 0%, #d4a017 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(2px 2px 0 #3a2c1b);
        }

        .subtitle {
            font-size: 0.55rem;
            color: #c0a882;
            text-align: center;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 #1f1508;
        }

        /* health bar */
        .health-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1f1508;
            border: var(--pixel-border);
            padding: 6px 10px;
            border-radius: 0;
            box-shadow: 0 4px 0 #4a3319;
        }
        .health-icon {
            font-size: 1.2rem;
            filter: drop-shadow(1px 1px 0 #000);
        }
        .health-bar-bg {
            flex: 1;
            height: 16px;
            background: #3a1a1a;
            border: 2px solid #5c3e1f;
            box-shadow: inset 0 2px 0 rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .health-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--hp-green);
            background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%);
            transition: width 0.25s ease, background 0.3s;
            box-shadow: 0 0 10px #2ecc71;
        }
        .health-bar-fill.danger {
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 0 12px #e74c3c;
        }
        .hp-text {
            font-size: 0.5rem;
            letter-spacing: 1px;
            color: #f5e6d3;
            text-shadow: 1px 1px 0 #000;
        }

        /* enemy area */
        .enemy-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 40px;
        }
        .enemy-sprite {
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.6));
            transition: transform 0.1s ease;
        }
        .enemy-sprite.windup {
            animation: enemy-windup 0.7s infinite ease-in-out;
        }
        .enemy-sprite.attacking {
            animation: enemy-strike 0.25s ease-out;
        }
        .enemy-name {
            font-size: 0.55rem;
            color: #d4a017;
            text-shadow: 1px 1px 0 #1f1508;
            background: #1f1508;
            padding: 4px 8px;
            border: 2px solid #5c3e1f;
        }
        @keyframes enemy-windup {
            0%,100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }
        @keyframes enemy-strike {
            0% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-10px) scale(1.25); }
            100% { transform: translateY(2px) scale(1); }
        }

        /* dodge circle (player shield) */
        .circle-wrapper {
            position: relative;
            width: var(--circle-size);
            height: var(--circle-size);
        }
        .circle-outer-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 4px dashed transparent;
            transition: all 0.15s ease;
            pointer-events: none;
            z-index: 0;
        }
        .circle-outer-ring.waiting {
            border-color: rgba(231, 76, 60, 0.6);
            animation: rotate-ring 4s linear infinite;
        }
        .circle-outer-ring.ready {
            border-color: rgba(46, 204, 113, 0.9);
            animation: rotate-ring 0.8s linear infinite;
        }
        .circle-outer-ring.too-early {
            border-color: rgba(241, 196, 15, 0.8);
        }
        @keyframes rotate-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dodge-circle {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a2c1b;
            border: 6px solid #5c3e1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 2px 0 rgba(255,255,200,0.1);
            transition: background-color 0.08s, border-color 0.1s, transform 0.1s;
            z-index: 1;
        }
        .dodge-circle:active {
            transform: scale(0.96);
        }
        .dodge-circle.idle {
            background: #4a3a24;
            border-color: #8b7355;
        }
        .dodge-circle.waiting {
            background: #4a2a1f;
            border-color: #c0392b;
            box-shadow: 0 0 25px rgba(231,76,60,0.4), inset 0 0 50px rgba(231,76,60,0.1);
        }
        .dodge-circle.ready {
            background: #1a3a1a;
            border-color: #27ae60;
            box-shadow: 0 0 35px #2ecc71, 0 0 70px rgba(46,204,113,0.5);
            animation: shield-pulse 0.25s ease-out;
        }
        .dodge-circle.too-early {
            background: #4a3a1a;
            border-color: #f1c40f;
            box-shadow: 0 0 25px rgba(241,196,15,0.5);
        }
        .dodge-circle.perfect {
            background: #1a3a2a;
            border-color: #f1c40f;
            box-shadow: 0 0 40px #f1c40f, 0 0 80px rgba(241,196,15,0.6);
        }
        .dodge-circle.good {
            background: #1a2a3a;
            border-color: #3498db;
            box-shadow: 0 0 30px #3498db;
        }
        .dodge-circle.miss {
            background: #3a1a1a;
            border-color: #e74c3c;
            box-shadow: 0 0 30px #e74c3c;
        }

        @keyframes shield-pulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .circle-content {
            text-align: center;
            pointer-events: none;
            z-index: 2;
        }
        .player-icon {
            font-size: clamp(3rem, 12vw, 5rem);
            line-height: 1;
            transition: all 0.1s;
        }
        .dodge-text {
            font-size: 0.65rem;
            font-family: 'Press Start 2P', monospace;
            color: #d4a017;
            text-shadow: 1px 1px 0 #1f1508;
            margin-top: 4px;
        }
        .ready .player-icon {
            font-size: clamp(4rem, 14vw, 7rem);
            text-shadow: 0 0 30px #2ecc71;
            animation: bounce-icon 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounce-icon {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .result-display {
            font-size: clamp(1.8rem, 8vw, 3rem);
            font-weight: bold;
            letter-spacing: 2px;
            line-height: 1.2;
        }
        .ms-display {
            font-size: 0.55rem;
            opacity: 0.8;
        }

        /* status text */
        .status-text {
            font-size: 0.6rem;
            text-align: center;
            min-height: 30px;
            line-height: 1.4;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0 #1f1508;
        }
        .status-waiting { color: #e67e22; }
        .status-ready { color: #2ecc71; animation: flash-text 0.4s infinite; }
        .status-too-early { color: #f1c40f; }
        .status-perfect { color: #f1c40f; }
        .status-good { color: #3498db; }
        .status-miss { color: #e74c3c; }

        /* buttons */
        .options-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .option-btn {
            padding: 8px 16px;
            border: 2px solid #8b7355;
            background: #3a2c1b;
            color: #f5e6d3;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #1f1508;
            box-shadow: 0 3px 0 #4a3a24;
            transition: 0.1s linear;
        }
        .option-btn.active {
            background: #d4a017;
            border-color: #f1c40f;
            color: #1f1508;
            text-shadow: none;
            box-shadow: 0 0 10px #f1c40f;
        }
        .action-btn {
            padding: 12px 28px;
            background: #e74c3c;
            border: none;
            border-bottom: 6px solid #a33024;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 0 4px 0 #4a1a1a;
            transition: 0.08s linear;
        }
        .action-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            border-bottom-width: 3px;
            pointer-events: none;
        }
        .action-btn.restart-btn {
            background: #3498db;
            border-bottom-color: #1f618d;
        }

        /* stats */
        .stats-panel {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            background: #1f1508;
            border: var(--pixel-border);
            padding: 8px 12px;
            min-height: 44px;
            align-items: center;
        }
        .attempt-badge {
            font-size: 0.5rem;
            padding: 4px 8px;
            border: 2px solid;
            background: #2b1e10;
            font-weight: bold;
        }
        .badge-perfect { border-color: #f1c40f; color: #f1c40f; }
        .badge-good { border-color: #3498db; color: #3498db; }
        .badge-miss { border-color: #e74c3c; color: #e74c3c; }
        .badge-flinch { border-color: #e67e22; color: #e67e22; }
        .no-attempts {
            font-size: 0.45rem;
            opacity: 0.7;
        }
        .avg-line {
            font-size: 0.5rem;
            text-align: center;
            color: #c0a882;
        }

        .key-hint {
            font-size: 0.45rem;
            color: #7a6a5a;
            text-align: center;
        }
        .key-icon {
            background: #3a2c1b;
            border: 2px solid #5c3e1f;
            padding: 2px 6px;
            font-size: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">⚔️ BLOCK TALES<br>DODGE TEST</h1>
        <div class="subtitle">Dodge the enemy attack! Time your click with the "!"</div>

        <!-- Health bar -->
        <div class="health-container" id="healthContainer">
            <span class="health-icon">❤️</span>
            <div class="health-bar-bg">
                <div class="health-bar-fill" id="healthFill" style="width: 100%;"></div>
            </div>
            <span class="hp-text" id="hpText">100/100</span>
        </div>

        <!-- Enemy -->
        <div class="enemy-area">
            <span class="enemy-sprite" id="enemySprite">🟢</span>
            <span class="enemy-name" id="enemyName">SLIME</span>
        </div>

        <!-- Dodge circle -->
        <div class="circle-wrapper" id="circleWrapper">
            <div class="circle-outer-ring" id="outerRing"></div>
            <div class="dodge-circle idle" id="dodgeCircle" tabindex="0">
                <div class="circle-content" id="circleContent">
                    <div class="player-icon" id="playerIcon">🛡️</div>
                    <div class="dodge-text" id="dodgeLabel">GUARD</div>
                </div>
            </div>
        </div>

        <!-- Status message -->
        <div class="status-text" id="statusText">Press <strong>START BATTLE</strong> to face the Slime!</div>

        <!-- Options for max wind-up time -->
        <div class="options-row">
            <button class="option-btn active" data-time="5000">⚡ FAST (5s)</button>
            <button class="option-btn" data-time="10000">🐌 SLOW (10s)</button>
        </div>

        <!-- Action button -->
        <button class="action-btn" id="actionBtn">⚔️ START BATTLE</button>

        <!-- Dodge attempts -->
        <div class="stats-panel" id="statsPanel">
            <span class="no-attempts" id="noAttemptsMsg">No dodges recorded yet...</span>
            <div id="attemptsContainer" style="display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;"></div>
        </div>
        <div class="avg-line" id="avgLine"></div>
        <div class="key-hint">
            <span class="key-icon">SPACE</span> or <span class="key-icon">CLICK</span> to dodge
        </div>
    </div>

    <script>
        (function() {
            // DOM
            const dodgeCircle = document.getElementById('dodgeCircle');
            const outerRing = document.getElementById('outerRing');
            const playerIcon = document.getElementById('playerIcon');
            const dodgeLabel = document.getElementById('dodgeLabel');
            const circleContent = document.getElementById('circleContent');
            const statusText = document.getElementById('statusText');
            const actionBtn = document.getElementById('actionBtn');
            const optFast = document.querySelector('[data-time="5000"]');
            const optSlow = document.querySelector('[data-time="10000"]');
            const enemySprite = document.getElementById('enemySprite');
            const enemyName = document.getElementById('enemyName');
            const healthFill = document.getElementById('healthFill');
            const hpText = document.getElementById('hpText');
            const noAttemptsMsg = document.getElementById('noAttemptsMsg');
            const attemptsContainer = document.getElementById('attemptsContainer');
            const avgLine = document.getElementById('avgLine');

            // State
            let currentState = 'idle'; // idle, waiting, ready, too_early, result
            let maxWindup = 5000;
            const minWindup = 1200;
            let signalTime = null;
            let windupTimeout = null;
            let playerHP = 100;
            const maxHP = 100;
            let attempts = []; // array of {type:'perfect'|'good'|'miss'|'flinch', ms: number|null}

            const resultTypes = {
                perfect: { maxMs: 200, label: 'PERFECT DODGE', class: 'perfect', badgeClass: 'badge-perfect', damage: 0, emoji: '✨' },
                good: { maxMs: 450, label: 'GOOD DODGE', class: 'good', badgeClass: 'badge-good', damage: 5, emoji: '👍' },
                miss: { maxMs: Infinity, label: 'MISS!', class: 'miss', badgeClass: 'badge-miss', damage: 20, emoji: '💥' }
            };

            function getDodgeResult(reactionMs) {
                if (reactionMs <= resultTypes.perfect.maxMs) return 'perfect';
                if (reactionMs <= resultTypes.good.maxMs) return 'good';
                return 'miss';
            }

            function updateHP(damage) {
                playerHP = Math.max(0, playerHP - damage);
                const percent = (playerHP / maxHP) * 100;
                healthFill.style.width = percent + '%';
                hpText.textContent = playerHP + '/' + maxHP;
                if (percent < 25) {
                    healthFill.classList.add('danger');
                } else {
                    healthFill.classList.remove('danger');
                }
                if (playerHP <= 0) {
                    gameOver();
                }
            }

            function resetHP() {
                playerHP = maxHP;
                healthFill.style.width = '100%';
                healthFill.classList.remove('danger');
                hpText.textContent = maxHP + '/' + maxHP;
            }

            function gameOver() {
                // Prevent further actions
                if (windupTimeout) clearTimeout(windupTimeout);
                currentState = 'gameover';
                setCircleVisual('idle');
                outerRing.className = 'circle-outer-ring';
                playerIcon.textContent = '💀';
                dodgeLabel.textContent = 'DEFEATED';
                statusText.textContent = 'You were defeated... Press RESTART to try again.';
                statusText.className = 'status-text';
                actionBtn.textContent = '🔄 RESTART';
                actionBtn.className = 'action-btn restart-btn';
                actionBtn.disabled = false;
                enemySprite.classList.remove('windup', 'attacking');
            }

            function resetToIdle() {
                if (windupTimeout) clearTimeout(windupTimeout);
                windupTimeout = null;
                signalTime = null;
                currentState = 'idle';
                setCircleVisual('idle');
                outerRing.className = 'circle-outer-ring';
                playerIcon.textContent = '🛡️';
                dodgeLabel.textContent = 'GUARD';
                statusText.textContent = 'Press START BATTLE to face the Slime!';
                statusText.className = 'status-text';
                actionBtn.textContent = '⚔️ START BATTLE';
                actionBtn.className = 'action-btn';
                actionBtn.disabled = false;
                enemySprite.classList.remove('windup', 'attacking');
                enemyName.textContent = 'SLIME';
                // Don't reset HP here; only on restart
            }

            function setCircleVisual(state) {
                dodgeCircle.classList.remove('idle', 'waiting', 'ready', 'too-early', 'perfect', 'good', 'miss');
                if (state) dodgeCircle.classList.add(state);
            }

            function startBattle() {
                if (playerHP <= 0) {
                    resetHP();
                    attempts = [];
                    renderAttempts();
                    avgLine.textContent = '';
                }
                resetToIdle();
                // Begin windup
                currentState = 'waiting';
                setCircleVisual('waiting');
                outerRing.className = 'circle-outer-ring waiting';
                playerIcon.textContent = '⏳';
                dodgeLabel.textContent = 'WAIT';
                statusText.textContent = 'The Slime is winding up an attack...';
                statusText.className = 'status-text status-waiting';
                actionBtn.textContent = '...wait...';
                actionBtn.disabled = true;
                enemySprite.classList.add('windup');
                enemyName.textContent = 'SLIME (preparing)';

                const delay = minWindup + Math.random() * (maxWindup - minWindup);
                windupTimeout = setTimeout(() => {
                    signalAttack();
                }, delay);
            }

            function signalAttack() {
                if (currentState !== 'waiting') return;
                currentState = 'ready';
                signalTime = performance.now();
                windupTimeout = null;
                setCircleVisual('ready');
                outerRing.className = 'circle-outer-ring ready';
                playerIcon.textContent = '❗';
                dodgeLabel.textContent = 'DODGE!';
                statusText.textContent = '❗ DODGE NOW! ❗';
                statusText.className = 'status-text status-ready';
                actionBtn.disabled = true;
                enemySprite.classList.remove('windup');
                enemySprite.classList.add('attacking');
                enemyName.textContent = 'SLIME (attack!)';
            }

            function handleDodgeClick() {
                if (currentState === 'idle') {
                    startBattle();
                } else if (currentState === 'waiting') {
                    // Too early!
                    flinch();
                } else if (currentState === 'ready') {
                    const reactionMs = Math.round(performance.now() - signalTime);
                    resolveDodge(reactionMs);
                } else if (currentState === 'too_early' || currentState === 'result') {
                    // restart automatically
                    resetToIdle();
                    if (playerHP > 0) startBattle();
                } else if (currentState === 'gameover') {
                    resetHP();
                    attempts = [];
                    renderAttempts();
                    avgLine.textContent = '';
                    resetToIdle();
                    startBattle();
                }
            }

            function flinch() {
                if (windupTimeout) clearTimeout(windupTimeout);
                windupTimeout = null;
                signalTime = null;
                currentState = 'too_early';
                setCircleVisual('too-early');
                outerRing.className = 'circle-outer-ring too-early';
                playerIcon.textContent = '😵';
                dodgeLabel.textContent = 'FLINCH!';
                statusText.textContent = 'You flinched too early! Take 10 damage.';
                statusText.className = 'status-text status-too-early';
                actionBtn.textContent = '↺ Retry';
                actionBtn.className = 'action-btn';
                actionBtn.disabled = false;
                enemySprite.classList.remove('windup', 'attacking');
                enemyName.textContent = 'SLIME';
                updateHP(10);
                attempts.push({ type: 'flinch', ms: null });
                renderAttempts();
                // auto reset after a moment if still alive
                setTimeout(() => {
                    if (currentState === 'too_early' && playerHP > 0) {
                        resetToIdle();
                    }
                }, 1500);
            }

            function resolveDodge(reactionMs) {
                const resultType = getDodgeResult(reactionMs);
                const info = resultTypes[resultType];
                currentState = 'result';
                signalTime = null;
                setCircleVisual(info.class);
                outerRing.className = 'circle-outer-ring';
                playerIcon.textContent = info.emoji;
                dodgeLabel.textContent = info.label;
                circleContent.innerHTML = `
                    <div class="result-display">${info.emoji}</div>
                    <div class="dodge-text">${info.label}</div>
                    <div class="ms-display">${reactionMs} ms</div>
                `;
                statusText.textContent = `${info.label}! ${reactionMs}ms – Damage taken: ${info.damage}`;
                statusText.className = 'status-text status-' + resultType;
                actionBtn.textContent = '↺ Next Attack';
                actionBtn.className = 'action-btn';
                actionBtn.disabled = false;
                enemySprite.classList.remove('windup', 'attacking');
                enemyName.textContent = 'SLIME';
                updateHP(info.damage);
                attempts.push({ type: resultType, ms: reactionMs });
                if (attempts.length > 8) attempts.shift();
                renderAttempts();
                // restore circle content after a bit if player still alive
                setTimeout(() => {
                    if (currentState === 'result' && playerHP > 0) {
                        restoreCircleContent();
                    }
                }, 1400);
            }

            function restoreCircleContent() {
                circleContent.innerHTML = `
                    <div class="player-icon" id="playerIcon">🛡️</div>
                    <div class="dodge-text" id="dodgeLabel">GUARD</div>
                `;
                // update global refs
                window.playerIcon = document.getElementById('playerIcon');
                window.dodgeLabel = document.getElementById('dodgeLabel');
                // reassign for later use
                playerIcon = document.getElementById('playerIcon');
                dodgeLabel = document.getElementById('dodgeLabel');
                if (currentState === 'result') {
                    resetToIdle();
                }
            }

            function renderAttempts() {
                if (attempts.length === 0) {
                    noAttemptsMsg.style.display = 'block';
                    attemptsContainer.innerHTML = '';
                    avgLine.textContent = '';
                    return;
                }
                noAttemptsMsg.style.display = 'none';
                attemptsContainer.innerHTML = attempts.map(a => {
                    let cls = '';
                    if (a.type === 'perfect') cls = 'badge-perfect';
                    else if (a.type === 'good') cls = 'badge-good';
                    else if (a.type === 'miss') cls = 'badge-miss';
                    else if (a.type === 'flinch') cls = 'badge-flinch';
                    let display = a.type === 'flinch' ? 'FL' : (a.ms !== null ? a.ms : '??');
                    return `<span class="attempt-badge ${cls}">${display}</span>`;
                }).join('');

                const reactionAttempts = attempts.filter(a => a.ms !== null).map(a => a.ms);
                if (reactionAttempts.length > 0) {
                    const avg = Math.round(reactionAttempts.reduce((s, v) => s + v, 0) / reactionAttempts.length);
                    const best = Math.min(...reactionAttempts);
                    avgLine.innerHTML = `Avg: ${avg}ms | Best: ${best}ms | Dodges: ${attempts.length}`;
                } else {
                    avgLine.textContent = `Flinchers: ${attempts.filter(a=>a.type==='flinch').length}`;
                }
            }

            // Event listeners
            dodgeCircle.addEventListener('click', (e) => {
                e.preventDefault();
                handleDodgeClick();
            });
            dodgeCircle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleDodgeClick();
            });
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' || e.key === ' ') {
                    e.preventDefault();
                    handleDodgeClick();
                }
            });

            actionBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentState === 'idle' || currentState === 'gameover') {
                    if (playerHP <= 0) {
                        resetHP();
                        attempts = [];
                        renderAttempts();
                        avgLine.textContent = '';
                    }
                    resetToIdle();
                    startBattle();
                } else if (currentState === 'too_early' || currentState === 'result') {
                    restoreCircleContent();
                    resetToIdle();
                    if (playerHP > 0) startBattle();
                }
            });

            optFast.addEventListener('click', () => {
                if (currentState === 'waiting' || currentState === 'ready') return;
                maxWindup = 5000;
                optFast.classList.add('active');
                optSlow.classList.remove('active');
                statusText.textContent = 'Wind-up speed: FAST (max 5s).';
            });
            optSlow.addEventListener('click', () => {
                if (currentState === 'waiting' || currentState === 'ready') return;
                maxWindup = 10000;
                optSlow.classList.add('active');
                optFast.classList.remove('active');
                statusText.textContent = 'Wind-up speed: SLOW (max 10s).';
            });

            // initial setup
            resetToIdle();
            resetHP();
            renderAttempts();
        })();
    </script>
</body>
</html>
